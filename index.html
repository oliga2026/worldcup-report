<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>世界杯赛前情报板</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="hero-copy">
        <p class="eyebrow">2026 年世界杯</p>
        <h1>世界杯赛前情报板</h1>
        <p class="hero-note">
          覆盖全部世界杯比赛，持续更新官方赛程、实时比分、逐场新闻、裁判、场地与盘口状态。
          当前已接通 FIFA 官方比赛数据；盘口模块只在抓到可验证数据时展示，不再输出模板化分析。
        </p>
      </div>
      <div class="status-block">
        <div class="status" id="updatedAt">正在读取更新...</div>
        <div class="status-sub" id="coverageText">覆盖全部世界杯比赛</div>
      </div>
    </header>

    <main class="layout">
      <section class="toolbar" aria-label="筛选报告">
        <button class="seg active" data-filter="all" type="button">全部</button>
        <button class="seg" data-filter="live" type="button">进行中</button>
        <button class="seg" data-filter="upcoming" type="button">未开赛</button>
        <button class="seg" data-filter="finished" type="button">已结束</button>
      </section>

      <section class="legend">
        <div class="legend-card">
          <strong>实时状态</strong>
          <span>优先展示官方比分、比赛状态、场地、裁判和新闻</span>
        </div>
        <div class="legend-card">
          <strong>盘口状态</strong>
          <span>只有抓到可验证盘口时才展示盘口与水位分析</span>
        </div>
        <div class="legend-card">
          <strong>逐场更新</strong>
          <span>每次运行更新脚本后，全量覆盖世界杯所有比赛数据</span>
        </div>
      </section>

      <section id="reports" class="reports" aria-live="polite"></section>
      <section id="emptyState" class="empty-state" hidden>
        <h2>暂无可显示比赛</h2>
        <p>自动更新完成后，这里会展示世界杯全部比赛的最新数据。</p>
      </section>
    </main>

    <template id="reportTemplate">
      <article class="match-card">
        <div class="match-head">
          <div>
            <p class="competition"></p>
            <h2 class="match-title"></h2>
            <p class="kickoff"></p>
          </div>
          <div class="head-side">
            <div class="match-status"></div>
            <div class="current-score"></div>
            <div class="pick"></div>
          </div>
        </div>

        <div class="quick-grid">
          <div><span>主胜</span><strong class="home-win"></strong></div>
          <div><span>平局</span><strong class="draw"></strong></div>
          <div><span>客胜</span><strong class="away-win"></strong></div>
          <div><span>比分判断</span><strong class="score"></strong></div>
        </div>

        <section class="signal-panel">
          <div class="section-head">
            <h3>关键信号</h3>
            <p>把最影响比赛走势和盘口判断的信号单独抽出来看。</p>
          </div>
          <div class="signal-grid"></div>
        </section>

        <details open>
          <summary>赛前情报快照</summary>
          <ul class="snapshot"></ul>
        </details>

        <details>
          <summary>最新新闻与动态</summary>
          <ul class="news"></ul>
        </details>

        <details open>
          <summary>盘口解读</summary>
          <p class="market"></p>
        </details>

        <details open>
          <summary>盘口变化与市场热度</summary>
          <p class="market-movement"></p>
        </details>

        <details>
          <summary>阵容与伤停</summary>
          <ul class="lineup"></ul>
        </details>

        <details>
          <summary>近期状态与数据</summary>
          <ul class="form-data"></ul>
        </details>

        <details>
          <summary>影响因素</summary>
          <ul class="factors"></ul>
        </details>

        <details>
          <summary>模型判断</summary>
          <p class="model-note"></p>
        </details>

        <details>
          <summary>投注风险提示</summary>
          <p class="risk"></p>
        </details>

        <footer class="sources-wrap">
          <div class="sources-title">信息来源</div>
          <div class="sources"></div>
        </footer>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
